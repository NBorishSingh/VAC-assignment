<!DOCTYPE html>
<html>
<body>
    <bg color="green"></bg>
    <h2>Student Registration Form</h2>
    <p>Fill in this form to register:</p>
    <form>
        <label for="FirstName">First Name:</label>
        <input type="text" id="FirstName" name="Enter your First Name"><br>
        <label for="LastName">Last Name:</label>
        <input type="text" id="LastName" name="Enter your Last Name"><br>
        <label for="Email">Email:</label>
        <input type="email" id="Email" name="Enter your Email"><br>
        <label for="d-o-b">Date of Birth</label>
        <input type="date" id="d-o-b" name="d-0-b" placeholder="dd-mm-yyyy"><br>
        <label for="set username">Set Username:</label>
        <input type="text" id="Set username" name="Set Username"><br>
        <label for="set password">Set Password:</label>
        <input type="password" id="Set password" name="Set Password"><br>
        <p>Gender</p>
        <input type="radio" id="male" name="male" value="male">
        <label for="male">Male</label><br>
        <input type="radio" id="female" name="male" value="female">
        <label for="female">Female</label><br>
        <input type="radio" id="others" name="others" value="others">
        <label for="others">Others</label><br>
        <label for="Course">Select Course:</label>
        <select id="Course" name="Course">
            <option value="BCA">BCA</option>
            <option value="MCA">BBA</option>
            <option value="B.tech">B.tech</option>
        </select><br><br>
        <input type="submit" value="Register">
    </form>
</body>
</html>
